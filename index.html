<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniDay Planner | Personal Schedule Garden</title>
  <meta name="description" content="Daily, Weekly, Monthly 일정관리와 브라우저 알림을 지원하는 나만의 일정관리 앱" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&family=Inter:wght@400;600;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #6fb6ff;
      --sky: #8fd1ff;
      --grass: #56c271;
      --grass-dark: #219653;
      --road: #48515f;
      --road-line: #f9fafb;
      --white: #ffffff;
      --text: #ffffff;
      --ink: #121826;
      --muted: rgba(255, 255, 255, 0.82);
      --panel: rgba(255, 255, 255, 0.22);
      --panel-strong: rgba(255, 255, 255, 0.32);
      --border: rgba(255, 255, 255, 0.42);
      --shadow: 0 35px 80px rgba(15, 23, 42, 0.25);
      
      /* 카테고리별 채도를 높인 미니 인터페이스 컬러 */
      --blue: #3b82f6;
      --purple: #a855f7;
      --orange: #f97316;
      --green: #10b981;
      --red: #ef4444;
      
      --radius-xl: 30px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --blur: blur(24px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      font-family: "Inter", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(255,255,255,.6), transparent 25rem),
        radial-gradient(circle at 85% 20%, rgba(255,209,102,.4), transparent 22rem),
        linear-gradient(180deg, #7ecbff 0%, #7ecbff 42%, #69c77b 42%, #4aad62 100%);
      background-attachment: fixed;
      overflow-x: hidden;
    }

    /* 상단 장식 및 배경 레이어 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255,255,255,.15), transparent 20%, transparent 80%, rgba(0,0,0,.08)),
        radial-gradient(ellipse at center, transparent 40%, rgba(255,255,255,.15) 70%, rgba(255,255,255,.35) 100%);
      z-index: -4;
    }

    h1, h2, h3 {
      font-family: "Gaegu", "Noto Sans KR", sans-serif;
    }

    a { color: inherit; text-decoration: none; }
    button, input, textarea, select { font: inherit; }

    /* 장난감 디오라마 백그라운드 요소 */
    .mini-world {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -3;
      overflow: hidden;
      filter: saturate(1.2) contrast(1.05);
    }

    .sun {
      position: absolute;
      right: 10vw;
      top: 8vh;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #ffd166;
      box-shadow: 0 0 50px rgba(255,209,102,.6);
    }

    .cloud {
      position: absolute;
      width: 160px;
      height: 50px;
      border-radius: 999px;
      background: rgba(255,255,255,.8);
      animation: cloudMove 45s linear infinite;
    }
    .cloud::before, .cloud::after {
      content: ""; position: absolute; border-radius: 50%; background: rgba(255,255,255,.85);
    }
    .cloud::before { width: 70px; height: 70px; left: 25px; top: -30px; }
    .cloud::after { width: 55px; height: 55px; right: 30px; top: -20px; }
    .c1 { left: 5vw; top: 12vh; animation-delay: -5s; }
    .c2 { left: 60vw; top: 18vh; transform: scale(.75); animation-delay: -20s; }

    @keyframes cloudMove {
      0%, 100% { transform: translateX(-30px); }
      50% { transform: translateX(60px); }
    }

    .tilt-plane {
      position: absolute;
      left: 50%;
      bottom: -180px;
      width: min(1400px, 120vw);
      height: 550px;
      transform: translateX(-50%) perspective(1000px) rotateX(60deg) rotateZ(-2deg);
      border-radius: 100px;
      background:
        linear-gradient(90deg, rgba(255,255,255,.08) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,.08) 1px, transparent 1px),
        #52c46a;
      background-size: 50px 50px;
      box-shadow: 0 -15px 60px rgba(16, 74, 38, 0.2) inset;
    }

    .road {
      position: absolute;
      left: 50%;
      bottom: -100px;
      width: 320px;
      height: 600px;
      transform: translateX(-50%) perspective(800px) rotateX(62deg);
      background: #3a4454;
      border-radius: 80px 80px 0 0;
      box-shadow: 0 15px 40px rgba(0,0,0,.15);
    }
    .road::before {
      content: ""; position: absolute; left: 50%; top: 20px; width: 8px; height: 500px;
      transform: translateX(-50%);
      background: repeating-linear-gradient(180deg, #fff 0 30px, transparent 30px 60px);
      opacity: .8;
    }

    /* 장난감 조형물 오브젝트 */
    .toy-building {
      position: absolute; bottom: 160px; width: 65px; height: 85px;
      border-radius: 14px 14px 8px 8px; background: linear-gradient(180deg, #ffffff, #e0f2fe);
      box-shadow: 0 12px 0 rgba(0,0,0,.1);
    }
    .toy-building::before {
      content: ""; position: absolute; inset: 12px 10px;
      background: repeating-linear-gradient(90deg, #3b82f6 0 8px, transparent 8px 16px);
      opacity: .6;
    }
    .b1 { left: 10vw; transform: scale(.9); }
    .b2 { right: 12vw; bottom: 200px; transform: scale(1.05); }

    .toy-tree {
      position: absolute; bottom: 140px; width: 24px; height: 45px;
      background: #854d0e; border-radius: 6px; box-shadow: 0 8px 0 rgba(0,0,0,.1);
    }
    .toy-tree::before {
      content: ""; position: absolute; left: 50%; top: -30px; width: 55px; height: 55px;
      transform: translateX(-50%); border-radius: 50%; background: #10b981;
    }
    .t1 { left: 24vw; }
    .t2 { right: 22vw; bottom: 150px; transform: scale(.8); }

    /* 레이아웃 메인 쉘 */
    .app-shell {
      width: min(1280px, calc(100% - 40px));
      margin: 0 auto;
      padding: 40px 0 60px;
    }

    /* 상단 탑바 헤더 */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 30px;
    }

    .brand { display: flex; align-items: center; gap: 16px; }
    .brand-icon {
      width: 56px; height: 56px; border-radius: 20px;
      display: grid; place-items: center;
      background: linear-gradient(135deg, #ff4d6d, #ff9f1c);
      box-shadow: 0 10px 0 rgba(0,0,0,.12);
      font-size: 1.8rem;
    }
    .brand h1 {
      font-size: 2.4rem; line-height: 1; letter-spacing: -0.02em; font-weight: 900;
    }
    .brand p {
      margin-top: 6px; color: var(--muted); font-weight: 700; font-size: 0.95rem;
      font-family: "Inter", sans-serif;
    }

    .top-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

    /* 장난감 질감 버턴 패키지 */
    .toy-btn {
      border: 0; cursor: pointer; border-radius: 16px; padding: 12px 20px;
      background: rgba(255,255,255,.25); color: var(--white); font-weight: 800;
      backdrop-filter: var(--blur); border: 1px solid var(--border);
      box-shadow: 0 8px 0 rgba(0,0,0,.1);
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
    }
    .toy-btn:hover {
      transform: translateY(-2px); box-shadow: 0 10px 0 rgba(0,0,0,.1);
      background: rgba(255,255,255,.35);
    }
    .toy-btn:active {
      transform: translateY(2px); box-shadow: 0 4px 0 rgba(0,0,0,.1);
    }
    .toy-btn.primary {
      background: linear-gradient(135deg, #2563eb, #3b82f6); border: 0;
    }
    .toy-btn.success {
      background: linear-gradient(135deg, #059669, #10b981); border: 0;
    }

    /* 메인 대시보드 그리드 구조 */
    .dashboard {
      display: grid;
      grid-template-columns: 340px 1fr 340px;
      gap: 24px;
      align-items: start;
    }

    /* 디오라마 패널 스타일 */
    .panel {
      border-radius: var(--radius-xl);
      background: var(--panel);
      border: 1px solid var(--border);
      backdrop-filter: var(--blur);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head { padding: 24px 24px 16px; }
    .panel-title { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.01em; }
    .panel-sub { color: var(--muted); font-size: 0.85rem; font-weight: 500; margin-top: 4px; }

    /* 뷰 전환 탭 */
    .view-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 24px 20px; }
    .view-tab {
      border: 0; cursor: pointer; border-radius: 12px; padding: 10px;
      background: rgba(255,255,255,.15); color: var(--white); font-weight: 800;
      border: 1px solid rgba(255,255,255,.2); transition: .15s;
    }
    .view-tab.active {
      background: var(--white); color: var(--ink); box-shadow: 0 6px 0 rgba(0,0,0,.1);
    }

    /* 정렬된 폼 인풋 필드 */
    .form-body { padding: 0 24px 24px; display: grid; gap: 16px; }
    .field label { display: block; font-size: 0.85rem; font-weight: 700; color: rgba(255,255,255,.9); margin-bottom: 6px; }
    
    .field input, .field textarea, .field select {
      width: 100%; border: 1px solid rgba(255,255,255,.3); border-radius: 12px;
      padding: 12px; background: rgba(255,255,255,.92); color: var(--ink);
      outline: none; font-weight: 600; font-size: 0.95rem; transition: border .2s;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      border: 2px solid var(--blue);
    }
    .field textarea { min-height: 100px; resize: vertical; line-height: 1.5; font-family: sans-serif; }

    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* 카테고리 알약 버튼 */
    .category-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .cat-pill {
      border: 0; border-radius: 999px; padding: 8px 12px; color: white;
      font-size: 0.8rem; font-weight: 800; cursor: pointer; opacity: 0.5;
      transition: all .15s ease; border: 1px solid rgba(255,255,255,0.2);
    }
    .cat-pill.active {
      opacity: 1; transform: translateY(-1px); box-shadow: 0 5px 0 rgba(0,0,0,.15);
    }

    .cat-study { background: var(--blue); }
    .cat-research { background: var(--purple); }
    .cat-work { background: var(--orange); }
    .cat-life { background: var(--green); }
    .cat-urgent { background: var(--red); }

    /* 토글 스위치 */
    .toggle-line {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; padding: 12px; border-radius: 12px;
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
      font-weight: 700; font-size: 0.9rem;
    }
    .switch {
      width: 44px; height: 24px; border-radius: 999px; background: rgba(255,255,255,.3);
      padding: 2px; cursor: pointer; transition: .2s ease;
    }
    .switch span { display: block; width: 20px; height: 20px; background: white; border-radius: 50%; transition: .2s ease; }
    .switch.on { background: var(--green); }
    .switch.on span { transform: translateX(20px); }

    /* 캘린더 메인 보드 */
    .main-calendar { min-height: 700px; }
    .calendar-toolbar {
      display: flex; justify-content: space-between; gap: 16px; align-items: center;
      padding: 24px; border-bottom: 1px solid rgba(255,255,255,.2);
    }
    .date-title h2 { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.01em; }
    .date-title p { color: var(--muted); font-weight: 600; margin-top: 4px; font-size: 0.9rem; font-family: "Inter", sans-serif; }
    
    .date-nav { display: flex; gap: 6px; align-items: center; }
    .icon-btn {
      border: 0; width: 38px; height: 38px; border-radius: 12px;
      display: grid; place-items: center; cursor: pointer;
      background: rgba(255,255,255,.15); color: var(--white);
      font-size: 1.2rem; font-weight: 800; border: 1px solid rgba(255,255,255,.2);
    }
    .icon-btn:hover { background: rgba(255,255,255,.25); }

    .calendar-body { padding: 24px; }

    /* 요약 지표 KPI 영역 */
    .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .kpi {
      border-radius: var(--radius-lg); padding: 16px;
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25);
      box-shadow: 0 6px 0 rgba(0,0,0,.06); text-align: center;
    }
    .kpi b { display: block; font-size: 1.8rem; font-weight: 900; line-height: 1; letter-spacing: -0.03em; font-family: "Inter", sans-serif; }
    .kpi span { display: block; margin-top: 6px; color: var(--muted); font-size: 0.8rem; font-weight: 700; }

    /* 각 일정 뷰 섹션 제어 */
    .daily-view, .weekly-view, .monthly-view { display: none; }
    .daily-view.active, .weekly-view.active, .monthly-view.active { display: block; }

    /* 타임라인 레이아웃 (Daily) */
    .timeline { display: grid; gap: 10px; }
    .time-slot { display: grid; grid-template-columns: 65px 1fr; gap: 16px; align-items: start; min-height: 60px; }
    .time-label { color: rgba(255,255,255,.85); font-family: "Inter", sans-serif; font-weight: 800; font-size: 0.85rem; padding-top: 10px; }
    .time-lane {
      min-height: 56px; border-radius: 14px; background: rgba(255,255,255,.1);
      border: 1px dashed rgba(255,255,255,.25); padding: 6px; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px;
    }

    /* 노션 스타일로 정돈된 태스크 카드 */
    .task-card {
      position: relative; border-radius: 14px; padding: 10px 12px;
      background: rgba(255,255,255,.95); color: var(--ink);
      box-shadow: 0 6px 0 rgba(0,0,0,.08); overflow: hidden;
      cursor: pointer; transition: transform .15s, opacity .15s;
    }
    .task-card:hover { transform: translateY(-2px); }
    .task-card.done { opacity: 0.55; text-decoration: line-through; }
    .task-card::before {
      content: ""; position: absolute; inset: 0 auto 0 0; width: 6px;
      background: var(--task-color, var(--blue));
    }

    .task-time { font-size: 0.75rem; color: #64748b; font-weight: 700; margin-bottom: 2px; font-family: "Inter", sans-serif; }
    .task-title { font-size: 0.9rem; font-weight: 700; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .task-meta { display: flex; gap: 4px; margin-top: 6px; font-size: 0.7rem; font-weight: 700; color: #475569; text-transform: uppercase; }
    .task-meta span { background: #e2e8f0; padding: 2px 6px; border-radius: 4px; }

    /* 위클리 그리드 */
    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
    .week-day {
      min-height: 400px; border-radius: var(--radius-lg);
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
      padding: 12px; display: flex; flex-direction: column; gap: 8px;
    }
    .week-day-head { font-weight: 800; display: flex; justify-content: space-between; font-size: 0.85rem; padding-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.15); }
    .week-day-head span:last-child { color: var(--muted); }

    /* 먼슬리 그리드 */
    .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .month-cell {
      min-height: 100px; border-radius: 16px; background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.18); padding: 8px;
      display: flex; flex-direction: column; gap: 4px; cursor: pointer; transition: .15s;
    }
    .month-cell:hover { background: rgba(255,255,255,.18); transform: translateY(-1px); }
    .month-cell.muted { opacity: 0.35; }
    .month-cell.today { background: rgba(255,255,255,.25); border: 2px solid var(--white); }
    .month-date { font-weight: 800; font-size: 0.85rem; font-family: "Inter", sans-serif; }
    .month-dots { display: flex; flex-wrap: wrap; gap: 3px; margin-top: auto; }
    .dot-task { width: 6px; height: 6px; border-radius: 50%; }

    /* 사이드 컴포넌트 */
    .side-section { padding: 20px 24px; border-top: 1px solid rgba(255,255,255,.2); }
    .side-section:first-of-type { border-top: 0; }
    .side-list { display: grid; gap: 8px; margin-top: 12px; }

    .empty {
      border-radius: 14px; padding: 16px; text-align: center;
      background: rgba(255,255,255,.08); border: 1px dashed rgba(255,255,255,.2);
      color: var(--muted); font-size: 0.85rem; font-weight: 500;
    }

    /* 상단 진행 바 */
    .mini-progress { height: 10px; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,.2); margin-top: 12px; }
    .mini-progress span {
      display: block; height: 100%; width: 0%;
      background: linear-gradient(90deg, #3b82f6, #10b981); transition: width 0.3s ease;
    }

    /* 가든 포커스 아이템 리스트 */
    .focus-item {
      display: grid; grid-template-columns: auto 1fr auto; gap: 10px;
      align-items: center; padding: 10px 12px; border-radius: 12px;
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.2);
      font-size: 0.85rem; font-weight: 600;
    }
    .focus-dot { width: 10px; height: 10px; border-radius: 50%; }
    .check-btn {
      border: 0; background: rgba(255,255,255,.2); color: white;
      border-radius: 8px; width: 24px; height: 24px; cursor: pointer; font-weight: 800;
    }

    /* 노션 팝업 디테일 모달 */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 2000; display: none;
      place-items: center; padding: 20px; background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(12px);
    }
    .modal-backdrop.show { display: grid; }
    .modal {
      width: min(500px, 100%); border-radius: 24px; background: #ffffff;
      color: var(--ink); box-shadow: 0 30px 70px rgba(0,0,0,0.25); overflow: hidden;
      animation: modalPop 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes modalPop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    
    .modal-head { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid #e2e8f0; }
    .modal-head h3 { font-size: 1.5rem; font-weight: 900; }
    .modal-close { border: 0; background: transparent; font-size: 1.5rem; cursor: pointer; color: #64748b; }
    .modal-body { padding: 24px; display: grid; gap: 16px; }
    
    .info-group label { display: block; font-size: 0.8rem; font-weight: 700; color: #64748b; margin-bottom: 4px; text-transform: uppercase; }
    .info-group p { font-size: 0.95rem; font-weight: 600; color: #1e293b; background: #f8fafc; padding: 10px 12px; border-radius: 8px; }
    .info-group textarea { width: 100%; border: 0; background: #f8fafc; border-radius: 8px; padding: 12px; font-size: 0.9rem; line-height: 1.5; color: #334155; height: 120px; }

    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; padding: 16px 24px; background: #f8fafc; border-top: 1px solid #e2e8f0; }
    .m-btn { border: 0; border-radius: 10px; padding: 10px 16px; font-weight: 700; cursor: pointer; font-size: 0.88rem; }
    .m-btn.del { background: #fee2e2; color: #ef4444; margin-right: auto; }
    .m-btn.done { background: #d1fae5; color: #065f46; }
    .m-btn.edit { background: #e0f2fe; color: #0369a1; }

    /* 토스트 알림창 */
    .toast {
      position: fixed; right: 24px; bottom: 24px; z-index: 3000;
      max-width: 350px; display: none; padding: 14px 20px; border-radius: 16px;
      background: rgba(18, 24, 38, 0.9); color: white; font-weight: 600;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2); font-size: 0.9rem;
    }
    .toast.show { display: block; animation: toastUp 0.25s ease; }
    @keyframes toastUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* 반응형 레이아웃 대응 */
    @media (max-width: 1150px) {
      .dashboard { grid-template-columns: 1fr; }
      .week-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 760px) {
      .topbar { flex-direction: column; align-items: flex-start; }
      .top-actions { width: 100%; }
      .top-actions .toy-btn { flex: 1; text-align: center; }
      .form-grid-2, .kpi-row, .week-grid, .month-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="mini-world" aria-hidden="true">
    <div class="sun"></div>
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="tilt-plane"></div>
    <div class="road"></div>
    <div class="toy-building b1"></div>
    <div class="toy-building b2"></div>
    <div class="toy-tree t1"></div>
    <div class="toy-tree t2"></div>
  </div>

  <div class="app-shell">

            <div class="kpi"><b id="kpiDone">0%</b><span>완료율</span></div>

  <div class="modal-backdrop" id="detailModal">

          <label>카테고리 및 우선순위</label>
          <p id="mMeta">STUDY · MEDIUM</p>
        </div>

        <button class="m-btn del" id="mDelBtn">삭제</button>
        <button class="m-btn done" id="mDoneBtn">완료 체크</button>
        <button class="m-btn edit" id="mEditBtn">수정</button>
      </div>
    </div>

  <div class="toast" id="globalToast"></div>

  <script>
    const STORAGE_KEY = 'miniGardenPlannerTasksV2';
    const catColors = { study: '#3b82f6', research: '#a855f7', work: '#f97316', life: '#10b981', urgent: '#ef4444' };

    let tasks = loadStoredTasks();
    let currentView = 'daily';
    let baseDate = new Date();
    let selectedCat = 'study';
    let isReminderOn = true;
    let targetTaskId = null;
    const alertHistory = new Set();

    const _ = (id) => document.getElementById(id);

    function zeroPad(num) { return String(num).padStart(2, '0'); }
    function parseDateKey(d) { return `${d.getFullYear()}-${zeroPad(d.getMonth()+1)}-${zeroPad(d.getDate())}`; }
    function constructDate(key) { const [y,m,d] = key.split('-').map(Number); return new Date(y, m-1, d); }
    
    function getWeekArray(date) {
      const current = new Date(date);
      const dayIndex = current.getDay();
      current.setDate(current.getDate() - dayIndex);
      return Array.from({length: 7}, (_, i) => {
        const d = new Date(current); d.setDate(current.getDate() + i); return d;
      });
    }

    function loadStoredTasks() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) return JSON.parse(data);
      } catch(e) { console.error("로컬 스토리지 데이터 획득 실패", e); }
      
      const todayStr = parseDateKey(new Date());
      return [
        { id: 'sample-1', title: '연구실 핵심 일정 백업하기', date: todayStr, time: '09:00', duration: 60, repeat: 'none', category: 'research', priority: 'high', note: '노션 워크스페이스에 있는 일정 데이터 동기화 상태 검증.', reminder: true, done: false },
        { id: 'sample-2', title: '개인 사이트 UI 컴포넌트 고도화', date: todayStr, time: '14:00', duration: 120, repeat: 'none', category: 'study', priority: 'medium', note: '미니 장난감 디오라마 템플릿 레이아웃 정돈 완료할 것.', reminder: true, done: true }
      ];
    }

    function commitTasks() { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }

    function triggerToast(msg) {
      const toast = _('globalToast'); toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function requestWebNotification() {
      if (!('Notification' in window)) { triggerToast('알림을 지원하지 않는 브라우저입니다.'); return; }
      Notification.requestPermission().then(permission => {
        if (permission === 'granted') triggerToast('브라우저 푸시 알림 가든이 오픈되었습니다!');
        else triggerToast('알림 권한이 거부되었습니다.');
      });
    }

    function verifyAndExecuteNotification() {
      if (!('Notification' in window) || Notification.permission !== 'granted') return;
      const now = new Date();
      const currentHoursMin = `${zeroPad(now.getHours())}:${zeroPad(now.getMinutes())}`;
      const todayStr = parseDateKey(now);

      tasks.forEach(t => {
        if (!t.reminder || t.done || t.date !== todayStr || t.time !== currentHoursMin) return;
        const hash = `${t.id}-${t.date}-${t.time}`;
        if (!alertHistory.has(hash)) {
          alertHistory.add(hash);
          new Notification('Schedule Garden 알림', { body: `지금 시작할 일정: ${t.title} (${t.time})`, icon: '🏡' });
        }
      });
    }

    function filterDateTasks(d) {
      const targetKey = parseDateKey(d);
      return tasks.filter(t => t.date === targetKey).sort((a,b) => a.time.localeCompare(b.time));
    }

    function repaintHeader() {
      const longDateKo = baseDate.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
      const engMonth = baseDate.toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
      
      if (currentView === 'daily') {
        _('viewTitle').textContent = 'Daily Miniature'; _('viewSub').textContent = longDateKo;
      } else if (currentView === 'weekly') {
        const w = getWeekArray(baseDate);
        _('viewTitle').textContent = 'Weekly Roadmap';
        _('viewSub').textContent = `${w[0].getMonth()+1}.${w[0].getDate()} - ${w[6].getMonth()+1}.${w[6].getDate()}`;
      } else {
        _('viewTitle').textContent = 'Monthly Landscape'; _('viewSub').textContent = engMonth;
      }
    }

    function makeTaskNode(t) {
      const node = document.createElement('div');
      node.className = `task-card ${t.done ? 'done' : ''}`;
      node.style.setProperty('--task-color', catColors[t.category] || '#3b82f6');
      node.innerHTML = `
        <div class="task-time">${t.time} (${t.duration}분)</div>
        <div class="task-title">${sanitize(t.title)}</div>
        <div class="task-meta"><span>${t.category}</span><span>${t.priority}</span></div>
      `;
      node.addEventListener('click', (e) => { e.stopPropagation(); popupDetailModal(t.id); });
      return node;
    }

    function drawDailySystem() {
      const container = _('dailyTimeSystem'); container.innerHTML = '';
      const dayTasks = filterDateTasks(baseDate);

      for (let h = 6; h <= 23; h++) {
        const timeStr = `${zeroPad(h)}:00`;
        const matched = dayTasks.filter(t => parseInt(t.time.split(':')[0]) === h);

        const slot = document.createElement('div');
        slot.className = 'time-slot';
        slot.innerHTML = `<div class="time-label">${timeStr}</div><div class="time-lane"></div>`;
        const lane = slot.querySelector('.time-lane');
        
        if (matched.length) matched.forEach(t => lane.appendChild(makeTaskNode(t)));
        container.appendChild(slot);
      }
    }

    function drawWeeklySystem() {
      const grid = _('weeklyGridSystem'); grid.innerHTML = '';
      const daysKo = ['일', '월', '화', '수', '목', '금', '토'];
      
      getWeekArray(baseDate).forEach((d, idx) => {
        const dayBox = document.createElement('div');
        dayBox.className = 'week-day';
        dayBox.innerHTML = `<div class="week-day-head"><span>${daysKo[idx]}요일</span><span>${d.getMonth()+1}/${d.getDate()}</span></div>`;
        
        const dayTasks = filterDateTasks(d);
        if (dayTasks.length) dayTasks.forEach(t => dayBox.appendChild(makeTaskNode(t)));
        else {
          const emp = document.createElement('div'); emp.className = 'empty'; emp.textContent = '일정 없음';
          dayBox.appendChild(emp);
        }
        grid.appendChild(dayBox);
      });
    }

    function drawMonthlySystem() {
      const grid = _('monthlyGridSystem'); grid.innerHTML = '';
      const y = baseDate.getFullYear(); const m = baseDate.getMonth();
      const firstDay = new Date(y, m, 1);
      const runner = new Date(firstDay); runner.setDate(1 - firstDay.getDay());
      const now = new Date();

      for (let i = 0; i < 42; i++) {
        const currentRunnerDate = new Date(runner);
        const cell = document.createElement('div');
        cell.className = 'month-cell';
        if (currentRunnerDate.getMonth() !== m) cell.classList.add('muted');
        if (parseDateKey(currentRunnerDate) === parseDateKey(now)) cell.classList.add('today');

        cell.innerHTML = `<div class="month-date">${currentRunnerDate.getDate()}</div><div class="month-dots"></div>`;
        const dotBox = cell.querySelector('.month-dots');
        
        const matchedTasks = tasks.filter(t => t.date === parseDateKey(currentRunnerDate));
        matchedTasks.slice(0, 5).forEach(t => {
          const dot = document.createElement('span'); dot.className = 'dot-task';
          dot.style.background = catColors[t.category] || '#3b82f6';
          dotBox.appendChild(dot);
        });

        cell.addEventListener('click', () => { baseDate = currentRunnerDate; syncFormDate(); changeActiveView('daily'); });
        grid.appendChild(cell);
        runner.setDate(runner.getDate() + 1);
      }
    }

    function drawSidebars() {
      const todayTasks = filterDateTasks(new Date());
      const doneCount = todayTasks.filter(t => t.done).length;
      const ratio = todayTasks.length ? Math.round((doneCount / todayTasks.length) * 100) : 0;
      
      _('sideProgressText').textContent = todayTasks.length ? `오늘 일정 ${todayTasks.length}개 중 ${doneCount}개 완료 (${ratio}%)` : '오늘 잡힌 가든 일정이 없습니다.';
      _('sideProgressBar').style.width = `${ratio}%`;

      const upcomingBox = _('sideUpcomingBox'); upcomingBox.innerHTML = '';
      const futureTasks = tasks.filter(t => !t.done && new Date(`${t.date}T${t.time}`) >= new Date())
                               .sort((a,b) => new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`))
                               .slice(0, 3);
      if (futureTasks.length) futureTasks.forEach(t => upcomingBox.appendChild(makeTaskNode(t)));
      else upcomingBox.innerHTML = '<div class="empty">다가오는 일정이 없습니다.</div>';

      const focusBox = _('sideFocusBox'); focusBox.innerHTML = '';
      const highTasks = tasks.filter(t => !t.done && t.priority === 'high').slice(0, 3);
      if (highTasks.length) {
        highTasks.forEach(t => {
          const fItem = document.createElement('div'); fItem.className = 'focus
